# ============================================================================
# Project Profile: everything that is project/framework-SPECIFIC lives here,
# never in the agent core. Extending the agent to a new stack = a new profile,
# not a code change. (See application/profile.py for the schema.)
# ============================================================================
name: msfw
language: java

target:
  # Root of the codebase the agent edits. The MSFW reactor itself.
  repo_path: "C:/Users/phams/IdeaProjects/msfw"
  # Module used as the safe practice target / golden reference.
  sandbox_module: "sample-service"

build:
  # Which MCP server implements BuildToolPort, and how to read its results.
  mcp_server: maven-server
  test_command: "mvn test"
  module_test_command: "mvn test -pl {module}"
  single_test_command: "mvn test -Dtest={test}"
  result_parser: surefire-xml            # parses target/surefire-reports/*.xml
  reports_glob: "**/target/surefire-reports/*.xml"

architecture:
  # Deterministic architecture gate. Runs INSIDE mvn test, not in Python.
  fitness: archunit
  package_root: "tech.vsf.ptnt"
  rules:
    - "domain-core must remain pure Java (no Spring, no jakarta.persistence imports)"
    - "hexagonal: domain must not depend on adapters"
    - "consumers must not pull in outbox/producer machinery"

knowledge:
  # Seeded into pgvector for the Planner. Data, not code.
  seed_docs:
    - "CLAUDE.md"
    - "docs/SERVICE_ARCHITECTURE.md"
    - "docs/USAGE.md"
    - "ops/observability/METRICS.md"
  golden_reference: "sample-service"

healing:
  max_attempts: 6                        # Circuit Breaker N (TC-CORE-06)
  reset_to_clean: true                   # each attempt starts from a clean worktree
  no_progress_breaker: true              # trip early if the error signature repeats

design:
  # Emit the SAD-style Markdown set AND Architecture-as-Code: a master workspace.dsl
  # (C4 model + views) + one .dsl fragment per bounded context, from the same DesignSpec.
  formats: [markdown, structurizr]

# Framework DESIGN conventions — reusable MSFW domain primitives the Analyst and
# Designer must PREFER over re-inventing (prompt-level guidance; deterministic
# enforcement stays in the ArchUnit/MsfwFitness gate above). Source: global house rules.
conventions:
  - "Identities: a String identity extends tech.vsf.ptnt.msfw.domain.core.StringIdentity (one-liner: `final class FooId extends StringIdentity { FooId(String v){ super(v); } }`). NEVER hand-roll Identity<String> with its own value field + equals/hashCode, and do NOT invent an IdGeneratorPort or call UUID.randomUUID in the domain — StringIdentity supplies value()/equals/hashCode/toString, a non-blank guard, and type-strict equality."
  - "Idempotency / client correlation tokens: reuse tech.vsf.ptnt.msfw.domain.core.IdempotencyKey (a StringIdentity); do not define a local one."
  - "Validation / guards throw tech.vsf.ptnt.msfw.exception.InvalidArgumentException (maps to HTTP 400) — NOT IllegalArgumentException, and do NOT invent a per-context DomainException / DomainErrorCode hierarchy."
  - "Money / Currency: reuse domain.type.Money (BigDecimal) + domain.type.Currency where the context calls for it; do not silently introduce a parallel money type."
  - "Sagas / process managers: use the domain.saga package (Saga, SagaStatus, SagaManager, SagaLifecycle) rather than hand-rolling a state enum + transition logic."
  - "Shared identifiers/types live in the shared kernel and are referenced by contexts; the shared kernel is a shared MODULE, never a bounded context of its own."

# A worked hexagonal exemplar for ONE bounded context — the Designer patterns each
# context on this shape and enumerates ports the same way (closes the L1/L8
# "test calls an undeclared port method" gap). Prompt-level guidance only.
design_exemplar: |
  Package shape for a context `catalog` (mirror per context):
    catalog/domain/model/      aggregates + value objects (ids extend StringIdentity)
    catalog/domain/port/in/    inbound USE-CASE interfaces (what callers may invoke)
    catalog/domain/port/out/   outbound REPOSITORY/GATEWAY interfaces
    catalog/application/       use-case implementations (domain services)
    catalog/adapters/inmemory/ outbound adapter implementations

  Worked contract (Catalog) — declare ALL of these in `interface_changes`:
    port/in:  interface AddCopyUseCase { CopyId addCopy(BookId bookId); }
    port/in:  interface RegisterBookUseCase { BookId registerBook(String isbn, String title); }
    port/out: interface BookRepository {
                void save(Book book);
                Optional<Book> findById(BookId id);
                Optional<Book> findByIsbn(String isbn);
                BookCopy findCopy(CopyId id);      // a finder a test calls -> declared here
                List<BookCopy> findAllCopies();    // ditto
              }
    domain:   class BookCopy { CopyStatus status; void borrow(); void returnToShelf(); }

  RULE shown by this example: EVERY method a key-flow or a locked test invokes
  (bookRepo.findAllCopies(), service.addCopy(...)) appears on one of the port
  interfaces above. No method is used without being declared.
